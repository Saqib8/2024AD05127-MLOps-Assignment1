name: CI/CD Pipeline

# Runs on every push and PR to main. The pipeline fails fast on lint or test
# errors (Task 5 requirement) and uploads model + report artifacts.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install flake8
      - name: Run flake8
        run: |
          # Fail on real errors; treat style issues as warnings.
          flake8 src api tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src api tests --count --max-line-length=120 --exit-zero --statistics

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download dataset
        run: python data/download_data.py
      - name: Run tests
        run: python -m pytest -v --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  train:
    name: Train model & log artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download dataset
        run: python data/download_data.py
      - name: Train model (MLflow tracked)
        run: python -m src.train
      - name: Upload model + metadata
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/heart_disease_model.joblib
            models/model_metadata.json
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

  docker-build:
    name: Build & smoke-test Docker image
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Train model for image
        run: |
          pip install -r requirements.txt
          python data/download_data.py
          python -m src.train
      - name: Build image
        run: docker build -t heart-disease-api:ci .
      - name: Run container & test /predict
        run: |
          docker run -d -p 8000:8000 --name api heart-disease-api:ci
          sleep 12
          curl -f http://localhost:8000/health
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":3,"ca":0,"thal":6}'
          docker logs api
          docker rm -f api
