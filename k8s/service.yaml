apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  labels:
    app: heart-disease-api
spec:
  # LoadBalancer exposes the API externally on a cloud provider (GKE/EKS/AKS).
  # On Minikube use `minikube service heart-disease-api` or `minikube tunnel`.
  type: LoadBalancer
  selector:
    app: heart-disease-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
