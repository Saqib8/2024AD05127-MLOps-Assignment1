# Prometheus scrape configuration for the Heart Disease API.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "heart-disease-api"
    metrics_path: /metrics
    static_configs:
      # 'api' resolves to the API container on the docker-compose network.
      # For a standalone Prometheus, replace with host.docker.internal:8000.
      - targets: ["api:8000"]
        labels:
          service: "heart-disease-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
